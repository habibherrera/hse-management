version: "3.8"

services:
  app:
    build: .
    container_name: hse-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://hse_user:hse_password@postgres:5432/hse_db"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3000}"
      SMTP_HOST: "${SMTP_HOST:-localhost}"
      SMTP_PORT: "${SMTP_PORT:-25}"
      SMTP_USER: "${SMTP_USER}"
      SMTP_PASS: "${SMTP_PASS}"
      SMTP_FROM: "${SMTP_FROM:-hse@empresa.com}"
      UPLOAD_DIR: "/app/uploads"
    volumes:
      - hse_uploads:/app/uploads
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    container_name: hse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hse_db
      POSTGRES_USER: hse_user
      POSTGRES_PASSWORD: hse_password
    volumes:
      - hse_pgdata:/var/lib/postgresql/data

volumes:
  hse_pgdata:
  hse_uploads:
